description: |-
  Перебор realm'ов Keycloak по эндпоинту /auth/realms/XXX (или /realms/XXX для Keycloak 17+).
  При обнаружении выводит имя realm и URL.

author: vinzekatze, claude-sonnet-4-6
tags:
  - keycloak
  - realm
  - enumeration
  - iam
  - sso

arguments:
  url:
    description: базовый URL Keycloak (http(s)://host:port, без слеша в конце)
    regex: '^http[s]?:\/\/.*[^\/]$'
    replacer: '#url#'
    multiple: true
  alt-prefix:
    description: использовать путь /realms/XXX (Keycloak 17+)
    default:
      - /auth/realms
      - /realms
    replacer: '#prefix#'
  t:
    description: количество параллельных запросов
    default: 10
    regex: '^\d+$'
    metavar: INT
    replacer: '#threads#'
  w:
    description: использовать дополнительный пользовательский словарь
    default:
      -
    metavar: FILE
    replacer: '#custom_wrdlst#'

file_1:
  path: wordlists/web/keycloak/keycloak-realms.txt
  description: встроенный словарь имён realm'ов
  replacer: '#wordlist#'
  quote:
    - '"'
    - '\'

mode:
  loop: url
  format:
    url: '{!r}'
    alt-prefix: '{!r}'
    w: >-
      {!r} | sort | uniq


shell: bash
script: |-
  KC_URL=#url#
  KC_PREFIX=#prefix#
  threads=#threads#

  echo -e "\e[1;92m[keycloak realm enum]\e[0m target: \e[1;91m${KC_URL}${KC_PREFIX}\e[0m"
  echo

  check_realm() {
    local realm=$1
    local endpoint="${KC_URL}${KC_PREFIX}/${realm}"
    local resp code body rname
    resp=$(curl -sk -w $'\n%{http_code}' --max-time 5 "$endpoint" 2>/dev/null)
    code="${resp##*$'\n'}"
    body="${resp%$'\n'*}"
    if [ "$code" = "200" ]; then
      rname=$(python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('realm','?'))" <<< "$body" 2>/dev/null || echo "$realm")
      echo -e "\e[1;92m[+]\e[0m \e[1;91m${rname}\e[0m → ${endpoint}"
    fi
  }
  export -f check_realm
  export KC_URL KC_PREFIX

  cat #wordlist# #custom_wrdlst# | parallel -j $threads check_realm {}

  echo
